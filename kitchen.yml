driver:
  name: vagrant

provisioner:
  name: chef_infra
  policyfile: Policyfile.rb
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] %>
  deprecations_as_errors: true
  chef_license: accept-no-persist
  attributes:
    firewall:
      allow_ssh: true
      allow_winrm: true
      allow_mosh: true
      allow_loopback: true
      allow_icmp: true
      firewalld:
        permanent: true

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-11
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    provisioner:
      named_run_list: default

  - name: firewalld
    includes:
      - amazonlinux-2023
    provisioner:
      named_run_list: firewalld

  - name: ufw
    includes:
      - debian-11
      - debian-12
      - debian-13
      - ubuntu-22.04
      - ubuntu-24.04
    provisioner:
      named_run_list: ufw

  - name: iptables
    includes:
      - almalinux-8
      - almalinux-9
      - amazonlinux-2023
      - centos-stream-9
      - fedora-latest
    provisioner:
      named_run_list: iptables
    attributes:
      firewall:
        ubuntu_iptables: true
        redhat7_iptables: true

  - name: nftables
    includes:
      - debian-11
      - debian-12
      - debian-13
    provisioner:
      named_run_list: nftables

  - name: firewalld-dbus
    includes:
      - debian-11
      - debian-12
      - debian-13
      - fedora-latest
    provisioner:
      named_run_list: firewalld_dbus

  - name: windows
    includes:
      - windows-latest
    provisioner:
      named_run_list: windows
